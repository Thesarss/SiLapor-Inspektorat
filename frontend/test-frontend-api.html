<!DOCTYPE html>
<html>
<head>
    <title>Frontend API Test</title>
</head>
<body>
    <h1>Frontend API Test</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const resultsDiv = document.getElementById('results');
        
        function log(message) {
            console.log(message);
            resultsDiv.innerHTML += '<p>' + message + '</p>';
        }
        
        async function testAPI() {
            try {
                log('🔄 Testing Frontend API calls...');
                
                // Test 1: Login
                log('1. 🔐 Testing login...');
                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        identifier: 'kepala.inspektorat@tanjungpinang.go.id',
                        password: 'password123'
                    })
                });
                
                if (!loginResponse.ok) {
                    log(`❌ Login failed: ${loginResponse.status} ${loginResponse.statusText}`);
                    return;
                }
                
                const loginData = await loginResponse.json();
                log('✅ Login successful');
                
                const token = loginData.token;
                if (!token) {
                    log('❌ No token received');
                    return;
                }
                
                // Test 2: Matrix Progress
                log('2. 📊 Testing matrix progress...');
                const progressResponse = await fetch(`${API_BASE}/matrix/progress`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`Progress response status: ${progressResponse.status}`);
                
                if (!progressResponse.ok) {
                    log(`❌ Matrix progress failed: ${progressResponse.status} ${progressResponse.statusText}`);
                    const errorText = await progressResponse.text();
                    log(`Error details: ${errorText}`);
                    return;
                }
                
                const progressData = await progressResponse.json();
                log('✅ Matrix progress successful');
                log(`Found ${progressData.data.length} progress records`);
                
                progressData.data.forEach((record, index) => {
                    log(`📊 Record ${index + 1}: ${record.matrix_title} (${record.progress_percentage}%)`);
                });
                
                // Test 3: Approvals
                log('3. 📋 Testing approvals...');
                const approvalsResponse = await fetch(`${API_BASE}/follow-ups/all-pending`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`Approvals response status: ${approvalsResponse.status}`);
                
                if (approvalsResponse.ok) {
                    const approvalsData = await approvalsResponse.json();
                    log(`✅ Found ${approvalsData.data.length} pending reviews`);
                } else {
                    log(`❌ Approvals failed: ${approvalsResponse.status}`);
                }
                
            } catch (error) {
                log(`❌ Test error: ${error.message}`);
                console.error('Full error:', error);
            }
        }
        
        // Run test when page loads
        testAPI();
    </script>
</body>
</html>
